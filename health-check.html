<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逢甲大學 學系網站健檢儀表板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif;background:#f0efe9;color:#1a1a18;font-size:15px;line-height:1.5;}
.layout{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
.sb{width:250px;flex-shrink:0;overflow-y:auto;border-right:1px solid #dddcd4;background:#f7f6f1;display:flex;flex-direction:column;}
.sb-hdr{padding:.85rem 1rem .7rem;border-bottom:1px solid #dddcd4;flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:.4rem;}
.sb-logo i{font-size:20px;color:#C8102E;}
.sb-t{font-size:14.5px;font-weight:700;color:#1a1a18;line-height:1.35;}
.sb-m{font-size:11.5px;color:#888780;margin-top:3px;line-height:1.6;}
.sb-btns{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.sb-btn{display:flex;align-items:center;gap:6px;width:100%;padding:6px 10px;font-size:12px;background:#fff;border:1px solid #d3d1c7;border-radius:7px;cursor:pointer;color:#534AB7;font-weight:600;text-decoration:none;transition:background .12s;}
.sb-btn:hover{background:#EEEDFE;border-color:#AFA9EC;}
.sb-btn.red{color:#C8102E;}
.sb-btn.red:hover{background:#fff0f2;border-color:#f5a0a8;}
.sb-btn-disabled{color:#b0adb8;cursor:default;background:#f7f6f1;border-color:#e2e0d8;}
.sb-btn-disabled:hover{background:#f7f6f1;border-color:#e2e0d8;}
.soon{font-size:10px;background:#e2e0d8;color:#888780;padding:1px 5px;border-radius:8px;margin-left:2px;}
.sb-body{flex:1;overflow-y:auto;padding-bottom:.75rem;}
.col-h{display:flex;align-items:center;gap:7px;margin-top:10px;padding:.45rem .9rem;font-size:12.5px;font-weight:800;color:#fff;background:linear-gradient(90deg,#C8102E 0%,#a00d26 100%);letter-spacing:.03em;}
.di{display:flex;align-items:center;gap:8px;padding:.35rem 1rem;cursor:pointer;color:#5F5E5A;border-left:3px solid transparent;transition:background .12s;}
.di:hover{background:rgba(0,0,0,.05);color:#1a1a18;}
.di.act{background:#fff;color:#C8102E;border-left-color:#C8102E;font-weight:700;}
.di-n{font-size:13px;line-height:1.35;flex:1;}
.di-score{font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0;}
.sA{background:#dcfce7;color:#15803d;}
.sB{background:#dbeafe;color:#1d4ed8;}
.sC{background:#fef9c3;color:#a16207;}
.sD{background:#fee2e2;color:#b91c1c;}
.sP{background:#f1f5f9;color:#94a3b8;}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:8px;background:#fff;border-bottom:1px solid #dddcd4;padding:.6rem 1.4rem;flex-shrink:0;font-size:12.5px;color:#888780;}
.topbar strong{color:#1a1a18;}
.mn{flex:1;overflow-y:auto;padding:1.1rem 1.4rem;background:#f0efe9;}
.empty{text-align:center;padding:5rem 2rem;color:#B4B2A9;font-size:14px;}
.empty i{font-size:28px;display:block;margin-bottom:.6rem;}

/* ── Cards ── */
.card{background:#fff;border-radius:12px;padding:1rem 1.2rem;margin-bottom:.8rem;border:1px solid #e5e4dc;}
.card-title{font-size:12px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem;display:flex;align-items:center;gap:6px;}
.dept-hd{display:flex;align-items:flex-start;gap:14px;}
.score-circle{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0;}
.dept-info h2{font-size:19px;font-weight:700;margin-bottom:3px;}
.dept-info .college-tag{font-size:11px;color:#C8102E;font-weight:700;margin-bottom:4px;}
.dept-info .url-link{font-size:12px;color:#185FA5;text-decoration:none;}
.dept-info .url-link:hover{text-decoration:underline;}
.dept-info .eval-date{font-size:11px;color:#888780;margin-top:2px;}
.pending-note{background:#f8fafc;border-radius:8px;padding:2.5rem;text-align:center;color:#94a3b8;font-size:13px;}

/* ── Dim bars ── */
.dim-grid{display:flex;flex-direction:column;gap:7px;}
.dbar-row{display:flex;align-items:center;gap:8px;}
.dbar-name{font-size:12px;color:#5F5E5A;width:138px;flex-shrink:0;line-height:1.3;}
.dbar-bg{flex:1;background:#ebe9e0;border-radius:6px;height:9px;overflow:hidden;}
.dbar-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.dbar-val{font-size:12px;font-weight:700;color:#1a1a18;width:42px;text-align:right;}

/* ── Two-col for radar+bars ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* ── Radar ── */
.radar-wrap{display:flex;justify-content:center;}
.radar-wrap canvas{max-width:240px;max-height:240px;}

/* ── Lists ── */
.sec-lbl{font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.item-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.item-list li{font-size:14px;padding:9px 12px 9px 32px;border-radius:8px;position:relative;line-height:1.65;}
.hl li{background:#f0fdf4;color:#166534;}
.hl li::before{content:'✓';position:absolute;left:10px;font-weight:700;color:#16a34a;}
.pl li{background:#fff1f2;color:#991b1b;}
.pl li::before{content:'⚠';position:absolute;left:9px;}
.fx{counter-reset:s}
.fx li{background:#fefce8;color:#78350f;counter-increment:s;}
.fx li::before{content:counter(s);position:absolute;left:10px;font-weight:800;color:#d97706;}

/* ── Per-page cards (two-col) ── */
.pages-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:900px){.pages-grid{grid-template-columns:1fr;}}
.page-card{background:#fff;border-radius:11px;border:1px solid #e5e4dc;overflow:hidden;}
.page-card-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #e5e4dc;background:#f7f6f1;}
.page-card-name{font-size:13.5px;font-weight:700;flex:1;}
.page-card-scores{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.ps{display:inline-flex;align-items:center;justify-content:center;width:32px;height:20px;border-radius:5px;font-size:11px;font-weight:700;color:#fff;}
.psA{background:#16a34a} .psB{background:#2563eb} .psC{background:#d97706} .psD{background:#dc2626} .psN{background:#94a3b8}
.dim-mini{font-size:10px;color:#888780;background:#ebe9e0;border-radius:4px;padding:1px 5px;}
.page-card-body{padding:10px 14px;}
.page-note-text{font-size:13px;color:#374151;line-height:1.75;}
.pg-link{color:#185FA5;text-decoration:none;font-size:11px;margin-left:auto;flex-shrink:0;}
.pg-link:hover{text-decoration:underline;}

/* ── Rubric ── */
.ru-card{background:#f8fafc;border-radius:9px;padding:12px 14px;margin-bottom:10px;border-left:3px solid #C8102E;}
.ru-card h4{font-size:13px;font-weight:700;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.ru-pts{font-size:10.5px;background:#C8102E;color:#fff;padding:2px 8px;border-radius:20px;}
.ru-card p{font-size:12px;color:#64748b;line-height:1.65;}
.excl-note{background:#fff8f0;border-radius:9px;padding:11px 14px;font-size:12px;color:#78350f;line-height:1.7;}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:2px solid #e5e4dc;margin-bottom:1rem;}
.tab{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:700;color:#888780;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .12s;}
.tab.on{color:#C8102E;border-bottom-color:#C8102E;}
.tab-panel{display:none;}
.tab-panel.on{display:block;}
</style>
</head>

    {name:'首頁',      url:'https://inde.fcu.edu.tw/',                          score:76, d1:26,d2:20,d3:13,d4:12,d5:5,

    {name:'學士班招生',url:'https://inde.fcu.edu.tw/admissions_undergraduate/', score:65, d1:17,d2:20,d3:12,d4:13,d5:3,

    {name:'碩博班招生',url:'https://inde.fcu.edu.tw/admissions_graduate/',      score:61, d1:16,d2:18,d3:12,d4:12,d5:3,

     notes:'全站文案最佳頁面之一。金字塔式課程地圖視覺清晰，「大一打底 → 大二分流 → 大三專攻 → 大四整合」路徑一目瞭然，高中生易於理解。小幅優化方向：①課程名稱旁若能加上一句白話說明（如「品質管理：學習讓每個零件都達標的方法」），可進一步降低理解門檻；②「業界選修」模組可列出 2–3 門合作企業開設的特色課程名稱，強化產學連結感。'},
    {name:'碩博士專業',url:'https://inde.fcu.edu.tw/graduate/',                 score:66, d1:22,d2:18,d3:12,d4:12,d5:0,
     notes:'研究方向分類（智慧製造／數位供應鏈／人因工程）清楚，但每個方向的說明文字過於學術，缺乏具體場景。建議每個方向補充一行「這項研究能解決什麼現實問題？」（例：「智慧製造：協助工廠預測機台故障，避免停工損失」），讓有意升學的學生或企業贊助者快速判斷相關性。研究室連結若能直通各研究室網頁（目前部分連結為空），效果更佳。'},

    {name:'產學合作',  url:'https://inde.fcu.edu.tw/research-project/',         score:54, d1:16,d2:16,d3:8, d4:11,d5:3,

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function gradeKey(s){return s>=80?'A':s>=70?'B':s>=60?'C':'D';}
function gradeColor(s){return s>=80?'#16a34a':s>=70?'#2563eb':s>=60?'#d97706':'#dc2626';}
function pct(v,mx){return Math.round(v/mx*100);}

/* ═══════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════ */
let radarChart = null;

function buildSidebar(){
  const body = document.getElementById('sb-body');
  const colleges = [...new Set(DEPTS.map(d=>d.college))];
  colleges.forEach(col=>{
    const depts = DEPTS.filter(d=>d.college===col);
    const hdr = document.createElement('div');
    hdr.className='col-h'; hdr.textContent=col;
    body.appendChild(hdr);
    depts.forEach(d=>{
      const el = document.createElement('div');
      el.className='di'; el.id='di-'+d.id;
      const scoreHtml = d.evaluated
        ? `<span class="di-score s${gradeKey(d.overall)}">${d.overall}</span>`
        : `<span class="di-score sP">—</span>`;
      el.innerHTML=`<div class="di-n">${d.name}</div>${scoreHtml}`;
      el.onclick=()=>selectDept(d.id);
      body.appendChild(el);
    });
  });
}

/* ═══════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════ */
function updateTopbar(){
  const evaled = DEPTS.filter(d=>d.evaluated);
  const avg = evaled.length ? Math.round(evaled.reduce((a,d)=>a+d.overall,0)/evaled.length) : null;
  document.getElementById('tb-evaled').textContent = evaled.length;
  document.getElementById('tb-total').textContent  = DEPTS.length;
  document.getElementById('tb-avg').textContent    = avg||'—';
}

/* ═══════════════════════════════════════════════════════
   SELECT DEPT
═══════════════════════════════════════════════════════ */
function selectDept(id){
  document.querySelectorAll('.di').forEach(e=>e.classList.remove('act'));
  const el = document.getElementById('di-'+id);
  if(el) el.classList.add('act');
  const d = DEPTS.find(x=>x.id===id);
  if(!d) return;
  d.evaluated ? renderEvaluated(d) : renderPending(d);
}

  document.getElementById('mn').innerHTML=`
  <div class="card">
    <div class="dept-hd">
      <div class="score-circle" style="background:#94a3b8;font-size:13px;line-height:1.3;text-align:center;">待<br>評估</div>
      <div class="dept-info">
        <div class="college-tag">${d.college}</div>
        <h2>${d.name}</h2>
        <a class="url-link" href="${d.url}" target="_blank">${d.url} ↗</a>
        <div class="eval-date">尚未進行健檢</div>
      </div>
    </div>
  </div>
  <div class="pending-note">
    <i class="ti ti-clock" style="font-size:28px;display:block;margin-bottom:.6rem;color:#94a3b8;"></i>
    此學系網站尚待排入健檢作業

}

  document.getElementById('mo-hl').innerHTML=(d.highlights||[]).slice(0,5).map(t=>`<li>${t}</li>`).join('');
  document.getElementById('mo-pl').innerHTML=(d.pain_points||[]).slice(0,10).map(t=>`<li>${t}</li>`).join('');
  document.getElementById('mo-fx').innerHTML=(d.quick_fixes||[]).map(t=>`<li>${t}</li>`).join('');

  // pages grid — two-column cards, text-focused
  const grid=document.getElementById('pagesGrid');
  (d.pages||[]).forEach(p=>{
    const pg=gradeKey(p.score);
    const dimStr=[
      `文案 ${p.d1}/35`,`圖像 ${p.d2}/25`,`連結 ${p.d3}/20`,`閱讀 ${p.d4}/15`,
      p.d5>0?`即時 ${p.d5}/5`:null
    ].filter(Boolean).map(s=>`<span class="dim-mini">${s}</span>`).join('');
    const card=document.createElement('div');
    card.className='page-card';
    card.innerHTML=`
      <div class="page-card-hd">
        <span class="ps ps${pg}">${p.score}</span>
        <span class="page-card-name">${p.name}</span>
        <a class="pg-link" href="${p.url}" target="_blank">↗ 前往</a>
      </div>
      <div class="page-card-body">
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;">${dimStr}</div>
        ${p.notes?`<p class="page-note-text">${p.notes}</p>`:'<p style="font-size:13px;color:#94a3b8;">尚無逐頁建議</p>'}
      </div>`;
    grid.appendChild(card);
  });

  // radar
  const ctx=document.getElementById('radarCanvas').getContext('2d');
  if(radarChart){radarChart.destroy();}
  radarChart=new Chart(ctx,{
    type:'radar',
    data:{
      labels:DIMS.map(x=>x.name),
      datasets:[{
        label:'得分（%）',
        data:DIMS.map(x=>pct(d[x.id],x.max)),
        backgroundColor:'rgba(200,16,46,.12)',
        borderColor:'rgba(200,16,46,.85)',
        pointBackgroundColor:'rgba(200,16,46,1)',
        pointRadius:4,
      }]
    },
    options:{
      responsive:true,
      scales:{r:{beginAtZero:true,max:100,ticks:{stepSize:25,font:{size:9}},pointLabels:{font:{size:10}}}},
      plugins:{legend:{display:false}}
    }
  });
}

function switchTab(i){
  document.querySelectorAll('.tab').forEach((b,idx)=>b.classList.toggle('on',idx===i));
  document.querySelectorAll('.tab-panel').forEach((p,idx)=>p.classList.toggle('on',idx===i));
}

document.addEventListener('DOMContentLoaded',()=>{
  buildSidebar();
  updateTopbar();
});
</script>
</body>
</html>
