const RUBRIC_TIP=`【資訊結構與事件即時性 /40】

30：即時，但缺乏GEO結構

10：延遲且無GEO結構

【視覺品質與版面 /30】（★依標題類型推估）

20：達標－標準合照＋基本分段（一般活動新聞）

 0：純公告/通知，無照片無分段

【語氣與真誠度 /30】

// 從「YYYY.MM.DD」格式日期字串建立 Date 物件
function parseD(s){const[y,m,d]=s.split('.').map(Number);return new Date(y,m-1,d);}

function autoSc(t,d){
  // ── 維度 1：資訊結構與事件即時性（含 GEO 優化）40分 ──
  // 【時效】：嘗試從標題提取 X月X日（事件日期），與發布日期(d)比對
  let isRecent=true; // 預設即時（若標題無日期則跳過時效扣分）
  if(d){
    const em=t.match(/(\d{1,2})月(\d{1,2})日/);
    if(em){
      const pub=parseD(d);
      const py=pub.getFullYear(), pm=pub.getMonth()+1;
      const evM=parseInt(em[1]), evD=parseInt(em[2]);
      // 事件年份：若事件月份 > 發布月份，視為上一年（跨年度邊界）
      const evYear=evM>pm?py-1:py;
      const ev=new Date(evYear,evM-1,evD);
      const diff=Math.round((pub-ev)/86400000); // 差距天數
      isRecent=diff>=0&&diff<=7;                 // 0~7天 = 即時；負值(未來) = 視為即時
    }
    // 標題無 X月X日 → 無法判斷事件日期 → 維持 isRecent=true（跳過時效扣分）
  }
  // 【GEO結構】：標題含量化數字+單位、具名縮寫、明確排名/屆次
  const hasNum=/\d+[人組件萬%名屆強校所位項]/.test(t);
  const hasAcronym=/AI|GEO|MOU|NVIDIA|IEET|EUR-ACE|WBC|ESG|SDG|USR|IEEE|ISO|RTX|AAIS|APT|AIA/.test(t);
  const hasRank=/全國[冠亞季]軍|全國第[一二三1-3]|全球排名|世界前\d|四強|蟬聯|冠軍/.test(t);
  const hasGEO=hasNum||hasAcronym||hasRank;
  const g=isRecent?(hasGEO?40:30):(hasGEO?20:10);

  // ── 維度 2：視覺品質與版面 30分（★標題推估，校園合照不扣分） ──
  // 先判斷「純公告/通知」→ 0分（通常無照片、無分段）
  const isNotice=/公告|甄選|作業|招生|通知|截止|規定|注意事項|辦理|開放申|月報/.test(t);
  let v;
  if(isNotice){
    v=0;
  } else if(/競賽|頒獎|典禮|畢典|成果展|發表會|音樂會|展覽|盛典|簽署|訪問|參訪|黑客松|馬拉松|錦標賽|授旗|授證/.test(t)){
    // 卓越加分：儀式感/現場感強的活動，預期有生動照片
    v=30;
  } else if(/論文|研究|期刊|升等|入選|獲聘|學報|計畫通過/.test(t)){
    // 降分：研究成就類，多為排版照或識別照，缺乏現場感
    v=10;
  } else {
    // 一般新聞：預期至少 1 張標準合照＋基本分段
    v=20;
  }

  // ── 維度 3：語氣與真誠度 30分 ──
  // 0分：官僚語氣
  const isBureau=/相關事項|作業規定|甄選公告|注意事項|依規辦理|敬請|依規定|填報/.test(t);
  if(isBureau)return{g,v,a:0};
  // 10分：PR 套話 / AI 機器感
  const isPR=/展現.{0,5}量能|再創佳績|大放異彩|豐碩成果|矚目成就|精彩呈現|卓越表現|璀璨|耀眼|亮眼|深耕|締造|強強聯手/.test(t);
  // 30分：真誠直白的人味語氣
  const isGenuine=/引領|探索|思索|體驗|走進|漫談|分享|訪談|對談|翻轉|返校|守護|陪伴|聆聽|重塑|攜手|用心/.test(t);
  const a=isPR?10:(isGenuine?30:20);

  return{g,v,a};
}

function grd(tot){
  if(tot>=80)return{l:'優良',c:'gg'};
  if(tot>=60)return{l:'普通',c:'gn'};
  if(tot>=40)return{l:'待改善',c:'gw'};
  return{l:'不足',c:'gp'};
}
function dotC(n){
  if(n>=15)return'#1D9E75';
  if(n>=5)return'#EF9F27';
  if(n>=1)return'#E24B4A';
  return'#B4B2A9';
}

// ── 月發文趨勢圖 ──
function buildMonthChart(af){
  // 產生 CUT 起至今的所有月份
  const months=[];
  const [cy,cm]=CUT.split('.').map(Number);
  let p=new Date(cy,cm-1,1);
  const now=new Date();
  while(p<=now){
    months.push(`${p.getFullYear()}.${String(p.getMonth()+1).padStart(2,'0')}`);
    p=new Date(p.getFullYear(),p.getMonth()+1,1);
  }
  // 各月計數
  const cnt={};
  months.forEach(m=>cnt[m]=0);
  af.forEach(n=>{const m=n.d.slice(0,7);if(cnt[m]!==undefined)cnt[m]++;});
  const max=Math.max(...Object.values(cnt),1);
  const BW=13,GAP=2,BH=28;
  const TW=months.length*(BW+GAP)-GAP;
  const bars=months.map((m,i)=>{
    const c=cnt[m];
    const h=c?Math.max(4,Math.round(c/max*BH)):0;
    const x=i*(BW+GAP);
    const fill=c>=5?'#1D9E75':c>=1?'#5DCAA5':'#ebe9e0';
    const numY=c>0?Math.max(8,BH-h-2):BH-2;
    const numFill=c>0?'#5F5E5A':'#B4B2A9';
    const fw=c>0?'600':'400';
    const op=c?'1':'.6';
    const lbl=m.slice(5)+'/'+"'"+m.slice(2,4);
    return `<g>
      <rect x="${x}" y="${BH-h}" width="${BW}" height="${Math.max(h,0)}" fill="${fill}" rx="2" opacity="${op}"/>
      <text x="${x+BW/2}" y="${numY}" font-size="4" text-anchor="middle" fill="${numFill}" font-weight="${fw}">${c}</text>
      <text x="${x+BW/2}" y="${BH+5}" font-size="2" text-anchor="middle" fill="#888780">${lbl}</text>
    </g>`;
  }).join('');
  // 「無文章」提示線
  const zeroline=`<line x1="0" y1="${BH}" x2="${TW}" y2="${BH}" stroke="#e5e4dc" stroke-width="1"/>`;
  return `<svg width="70%" viewBox="0 0 ${TW} ${BH+16}" xmlns="http://www.w3.org/2000/svg" style="display:block;">${zeroline}${bars}</svg>`;
}

// Pre-compute
// 新聞數量＝校網以#學系名稱串接的校網新聞 ＋ 學系自行建置（不重複計算）
D.forEach(d=>{
  // 1. 學系網站自有新聞（CUT 後），逐篇評分並標記是否已出現於校網
  const deptAf=d.news.filter(n=>n.d>=CUT).sort((a,b)=>b.d.localeCompare(a.d));
  const deptTitles=new Set(deptAf.map(n=>n.t));
  const deptUrls=new Set(deptAf.map(n=>n.url).filter(Boolean));
  deptAf.forEach(n=>{
    const s=autoSc(n.t,n.d);n.g=s.g;n.v=s.v;n.a=s.a;n.tot=s.g+s.v+s.a;
    // 判斷是否為校網來源：直接讀取該網址在 www.fcu.edu.tw 文章頁上的真實 #hashtag，
    // 確認其中是否包含此學系名稱（URL_CATS 為即時抓取結果，比快取的 SCHOOL_RAW 更準確完整）
    const liveCats=n.url?URL_CATS[n.url]:null;
    const sr=(n.url&&SCH_BY_URL.get(n.url))||SCH_BY_TITLE.get(n.t);
    const cats=liveCats||sr?.cats||[];
    n.fromSch=cats.includes(d.name);
    if(n.fromSch){n.schUrl=n.url||sr?.url;}
  });

  // 2. 校網有標記此系（cats 含 d.name）但學系尚未轉貼的新聞（校網獨家，以網址或標題去重）
  const schOnly=SCHOOL_RAW
    .filter(s=>jd(s.d)>=CUT&&(s.cats||[]).includes(d.name)&&!deptTitles.has(s.t)&&!deptUrls.has(s.url))
    .map(s=>{
      const sd=jd(s.d);
      const sc=autoSc(s.t,sd);
      return{d:sd,t:s.t,url:s.url,fromSch:true,schUrl:s.url,
             g:sc.g,v:sc.v,a:sc.a,tot:sc.g+sc.v+sc.a};
    });

  // 3. 合併：學系自有 ＋ 校網獨家串接，按日期降序
  const af=[...deptAf,...schOnly].sort((a,b)=>b.d.localeCompare(a.d));

  d.af=af;
  d.cnt=af.length;
  d.last=af[0]?.d||'—';
  d.avgSc=af.length?Math.round(af.reduce((s,n)=>s+n.tot,0)/af.length):0;
  d.mavg=af.length?(af.length/MONTHS).toFixed(1):'0.0';
  d.fromSch=af.filter(n=>n.fromSch).length;  // 校網介接（含轉貼＋獨家）
  d.self=af.filter(n=>!n.fromSch).length;     // 學系純自建
});

  cols.forEach(c=>{
    h+=`<div class="col-h">${c.name}</div>`;
    D.filter(d=>d.col===c.k).forEach(d=>{

}

// ── 新聞撰寫小幫手：產生提示詞 ──
function buildWriterPrompt(){
  const dept=document.getElementById('wDept').value.trim();
  const theme=document.getElementById('wTheme').value.trim();
  const time=document.getElementById('wTime').value.trim();
  const place=document.getElementById('wPlace').value.trim();
  const attendees=document.getElementById('wAttendees').value.trim();
  const host=document.getElementById('wHost').value.trim();
  const cohost=document.getElementById('wCohost').value.trim();
  const content=document.getElementById('wContent').value.trim();
  const faculty=document.getElementById('wFaculty').value.trim();
  const guest=document.getElementById('wGuest').value.trim();
  const feedback=document.getElementById('wFeedback').value.trim();
  const attach=document.getElementById('wAttach').value.trim();
  const audience=document.getElementById('wAudience').value.trim();

  const lineField=(label,val)=>val?(label+'：'+val+'\n'):'';
  const block=(label,val)=>val?('\n'+label+'：\n'+val+'\n'):'';

  const infoLines=
    lineField('學系/單位',dept)+
    lineField('活動主題/競賽主題',theme)+
    lineField('活動時間',time)+
    lineField('活動地點',place)+
    lineField('參與人數',attendees)+
    lineField('活動主辦單位',host)+
    lineField('活動協辦單位',cohost);

  const prompt=`請扮演專業的公關與新聞發布專家。請以「優質台灣記者」的身分、視角和語氣來撰寫，產出一篇能吸引線上記者目光、具備高刊登率，且同時符合 Google SEO 與 AI 搜尋引擎最佳化（GEO）標準的優質新聞稿。

我會提供你一份新聞稿的原始素材（素材可能包含活動資訊、長官致詞、學生心得或相關附件，視當次提供內容而定）。【最高指導原則】：若素材中缺乏具體數據、人名或職稱等必要資訊，絕對不可自行捏造，請直接使用 [請填入OO資訊] 標示，提醒我後續補上。若素材中缺乏某項結構（如引言），請直接略過，切勿自行發明。

撰寫時，請務必「嚴格遵守」以下所有原則：

【一、結構與標題】
1. 精準標題：在30字內濃縮5W1H核心亮點，必須包含具體數據或結構化實體。絕對避免「OO單位舉辦OO活動」這種無資訊量的報告體標題。
2. 倒金字塔結構：
- 第一段（破題）：包含最核心的5W1H，前100字就必須呈現新聞價值。請自我檢查：若整篇稿件只留第一段，這則新聞的價值是否依然成立？
- 第二段（補充）：展開重要的細節與數據佐證。
- 第三段（引言與背景）：放入素材中提供的長官引言、參與者心得及相關背景資訊。

【二、語氣與用字】
1. 真誠直白、具備人味：語氣要真誠直接，陳述事實。絕對避免「秉持無與倫比的前瞻性」、「展現量能」、「大放異彩」等空泛的包裝詞彙與AI機器感字眼。
2. 數據取代形容詞：減少使用「盛大」、「熱烈」、「積極推動」等主觀形容詞。請從素材中找出「量化數據」（如人數、家數、成長比例）來定義活動的規模與價值。

【三、引言處理（若有提供素材）】
1. 長官/貴賓引言：要像「有見地且溫暖的真實人類」在說話，真誠傳達機構的願景與關懷，嚴禁出現「敬請指教」等制式官腔或上對下指導語氣。
2. 學生/參與者分享：保留其真實的語氣與感受，不要將其修飾成生硬的官方宣傳稿。

【四、專有名詞與稱呼規範】
1. 單位名稱：絕對不使用「本校」、「本系」。一律使用客觀的單位名稱，第一次提及用全稱，第二次起用簡稱。
2. 人物首次提及：格式為「單位＋職稱＋全名」（例：○○科技執行長王小明），職稱在前、姓名在後，不加「先生」、「女士」、「長官」等敬語。若為外籍人士，寫為「職稱＋中文譯名（英文全名）」。
3. 人物再次提及：僅寫姓名（例：王小明補充表示...）。【例外規定】：國家元首、董事長、校長、副校長及重要貴賓，後續提及時仍須持續使用職稱稱呼。

【五、SEO 與 GEO 友善寫作規範】
1. 強化結構化實體（Entities）：確保人事時地物等「專有名詞」（如特定學校、企業名稱、計畫名稱、地點）在第一、二段完整且正確地出現，協助 AI 爬蟲建立知識圖譜。
2. 自動判斷受眾與關鍵字：請先根據素材內容，判斷這篇新聞稿的「主要目標受眾」（如：潛在學生與家長、產學合作企業、教育圈等），並將該受眾可能搜尋的長尾關鍵字，以自然、不生硬的方式融入內文與小標題中。
3. 直接且完整的解答（Direct Answers）：針對活動的核心價值或解決的痛點，在段落開頭給予簡明扼要的解答，以符合 AI 搜尋引擎擷取摘要的邏輯。

【六、輸出格式要求】
請直接輸出正式內容，不要包含 markdown 符號（如 # 或 *），並按照以下格式排版：

【建議標題】
（提供3-5個符合規範的標題供選擇）

【新聞稿正文】
（依據倒金字塔原則，約600-800字，分段清晰）

【視覺素材建議】
（請根據新聞稿內容，用1-2句話建議發布時應搭配什麼樣的照片。提醒：強調構圖乾淨、捕捉真實互動瞬間，避免排排站大合照）

以下是本次的新聞稿原始素材，請開始撰寫：

${infoLines}
活動描述：
${content}
${block('師長致詞內容',faculty)}${block('貴賓致詞內容',guest)}${block('學生參與活動/競賽獲獎心得',feedback)}${block('活動附件說明',attach)}${block('目標受眾/溝通重點',audience)}`;

  document.getElementById('wOutput').value=prompt;
  document.getElementById('wOutputCard').style.display='block';
  document.getElementById('wOutputCard').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── 新聞英譯小幫手：比對詞彚庫並產生提示詞 ──
function buildTranslatorPrompt(){
  const content=document.getElementById('tContent').value.trim();
  if(content.length<5){
    alert('請貼上中文新聞稿內容');
    return;
  }

  // 比對詞彚庫：找出文章中出現的所有詞條（同一中文詞若有多個官方英文版本，全部保留）
  const matchedMap=new Map();
  GLOSSARY.forEach(g=>{
    if(g.zh.length>=2&&content.includes(g.zh)){
      if(!matchedMap.has(g.zh))matchedMap.set(g.zh,new Set());
      matchedMap.get(g.zh).add(g.cat+'｜'+g.en);
    }
  });
  const matches=[...matchedMap.entries()]
    .sort((a,b)=>b[0].length-a[0].length)
    .map(([zh,set])=>({zh,variants:[...set].map(s=>s.split('｜'))}));

  const matchCard=document.getElementById('tMatchCard');
  const matchList=document.getElementById('tMatchList');
  if(matches.length){
    matchList.innerHTML=matches.map(m=>{
      const ens=m.variants.map(v=>v[1]).join('／');
      return `<div style="margin-bottom:4px;"><strong>${m.zh}</strong> → ${ens}</div>`;
    }).join('');
  } else {
    matchList.innerHTML='<span style="color:#B4B2A9;">未比對到詞彚庫中的專有名詞</span>';
  }
  matchCard.style.display='block';

  const glossaryLines=matches.map(m=>{
    const ens=m.variants.map(v=>v[1]);
    const enText=ens.length>1?(ens.join('／')+'（官方詞彚庫有多個版本，請依文意選用最合適者）'):ens[0];
    return m.zh+' = '+enText;
  }).join('\n');

  const prompt=`你是一位具備高等教育背景的專業新聞翻譯人員，請將以下逢甲大學中文新聞稿翻譯成適合國際讀者閱讀的英文新聞稿。

【翻譯原則】
1. 專有名詞優先：以下是從逢甲大學官方雙語詞彚庫中比對到、本篇文章內出現的專有名詞（單位組織、人事、職稱、建築物等），翻譯時「必須」採用以下對照表的英文版本，不可自行另譯：
${glossaryLines||'（本文未比對到詞彚庫中的專有名詞）'}

2. 語氣與用字：請以高等教育工作者的程度與角度撰寫，使用正式但易讀的學術新聞英文，避免口語化，也避免過度生硬的官方公文體，符合國際大學新聞稿的慣用語氣與寫作風格。
3. 若文中出現詞彚庫未列出的人名、職稱或單位名稱，請依英文新聞慣例合理翻譯（人名可用漢語拼音），並維持全文用語前後一致。
4. 直接輸出翻譯後的英文新聞稿全文，不要包含 markdown 符號，也不需附上中文原文或額外說明。

──────────

以下是中文新聞稿原文：

${content}`;

  document.getElementById('tOutput').value=prompt;
  document.getElementById('tOutputCard').style.display='block';
  document.getElementById('tOutputCard').scrollIntoView({behavior:'smooth',block:'start'});
}
