// 從「YYYY.MM.DD」格式日期字串建立 Date 物件
function parseD(s){const[y,m,d]=s.split('.').map(Number);return new Date(y,m-1,d);}

function autoSc(t,d){
  // ── 維度 1：資訊結構與事件即時性（含 GEO 優化）40分 ──
  // 【時效】：嘗試從標題提取 X月X日（事件日期），與發布日期(d)比對
  let isRecent=true; // 預設即時（若標題無日期則跳過時效扣分）
  if(d){
    const em=t.match(/(\d{1,2})月(\d{1,2})日/);
    if(em){
      const pub=parseD(d);
      const py=pub.getFullYear(), pm=pub.getMonth()+1;
      const evM=parseInt(em[1]), evD=parseInt(em[2]);
      // 事件年份：若事件月份 > 發布月份，視為上一年（跨年度邊界）
      const evYear=evM>pm?py-1:py;
      const ev=new Date(evYear,evM-1,evD);
      const diff=Math.round((pub-ev)/86400000); // 差距天數
      isRecent=diff>=0&&diff<=7;                 // 0~7天 = 即時；負值(未來) = 視為即時
    }
    // 標題無 X月X日 → 無法判斷事件日期 → 維持 isRecent=true（跳過時效扣分）
  }
  // 【GEO結構】：標題含量化數字+單位、具名縮寫、明確排名/屆次
  const hasNum=/\d+[人組件萬%名屆強校所位項]/.test(t);
  const hasAcronym=/AI|GEO|MOU|NVIDIA|IEET|EUR-ACE|WBC|ESG|SDG|USR|IEEE|ISO|RTX|AAIS|APT|AIA/.test(t);
  const hasRank=/全國[冠亞季]軍|全國第[一二三1-3]|全球排名|世界前\d|四強|蟬聯|冠軍/.test(t);
  const hasGEO=hasNum||hasAcronym||hasRank;
  const g=isRecent?(hasGEO?40:30):(hasGEO?20:10);

  // ── 維度 2：視覺品質與版面 30分（★標題推估，校園合照不扣分） ──
  // 先判斷「純公告/通知」→ 0分（通常無照片、無分段）
  const isNotice=/公告|甄選|作業|招生|通知|截止|規定|注意事項|辦理|開放申|月報/.test(t);
  let v;
  if(isNotice){
    v=0;
  } else if(/競賽|頒獎|典禮|畢典|成果展|發表會|音樂會|展覽|盛典|簽署|訪問|參訪|黑客松|馬拉松|錦標賽|授旗|授證/.test(t)){
    // 卓越加分：儀式感/現場感強的活動，預期有生動照片
    v=30;
  } else if(/論文|研究|期刊|升等|入選|獲聘|學報|計畫通過/.test(t)){
    // 降分：研究成就類，多為排版照或識別照，缺乏現場感
    v=10;
  } else {
    // 一般新聞：預期至少 1 張標準合照＋基本分段
    v=20;
  }

  // ── 維度 3：語氣與真誠度 30分 ──
  // 0分：官僚語氣
  const isBureau=/相關事項|作業規定|甄選公告|注意事項|依規辦理|敬請|依規定|填報/.test(t);
  if(isBureau)return{g,v,a:0};
  // 10分：PR 套話 / AI 機器感
  const isPR=/展現.{0,5}量能|再創佳績|大放異彩|豐碩成果|矚目成就|精彩呈現|卓越表現|璀璨|耀眼|亮眼|深耕|締造|強強聯手/.test(t);
  // 30分：真誠直白的人味語氣
  const isGenuine=/引領|探索|思索|體驗|走進|漫談|分享|訪談|對談|翻轉|返校|守護|陪伴|聆聽|重塑|攜手|用心/.test(t);
  const a=isPR?10:(isGenuine?30:20);

  return{g,v,a};
}

}

// ── 月發文趨勢圖 ──
function buildMonthChart(af){
  // 產生 CUT 起至今的所有月份
  const months=[];
  const [cy,cm]=CUT.split('.').map(Number);
  let p=new Date(cy,cm-1,1);
  const now=new Date();
  while(p<=now){
    months.push(`${p.getFullYear()}.${String(p.getMonth()+1).padStart(2,'0')}`);
    p=new Date(p.getFullYear(),p.getMonth()+1,1);
  }
  // 各月計數
  const cnt={};
  months.forEach(m=>cnt[m]=0);
  af.forEach(n=>{const m=n.d.slice(0,7);if(cnt[m]!==undefined)cnt[m]++;});
  const max=Math.max(...Object.values(cnt),1);
  const BW=13,GAP=2,BH=28;
  const TW=months.length*(BW+GAP)-GAP;
  const bars=months.map((m,i)=>{
    const c=cnt[m];
    const h=c?Math.max(4,Math.round(c/max*BH)):0;
    const x=i*(BW+GAP);
    const fill=c>=5?'#1D9E75':c>=1?'#5DCAA5':'#ebe9e0';
    const numY=c>0?Math.max(8,BH-h-2):BH-2;
    const numFill=c>0?'#5F5E5A':'#B4B2A9';
    const fw=c>0?'600':'400';
    const op=c?'1':'.6';
    const lbl=m.slice(5)+'/'+"'"+m.slice(2,4);
    return `<g>
      <rect x="${x}" y="${BH-h}" width="${BW}" height="${Math.max(h,0)}" fill="${fill}" rx="2" opacity="${op}"/>
      <text x="${x+BW/2}" y="${numY}" font-size="4" text-anchor="middle" fill="${numFill}" font-weight="${fw}">${c}</text>
      <text x="${x+BW/2}" y="${BH+5}" font-size="2" text-anchor="middle" fill="#888780">${lbl}</text>
    </g>`;
  }).join('');
  // 「無文章」提示線
  const zeroline=`<line x1="0" y1="${BH}" x2="${TW}" y2="${BH}" stroke="#e5e4dc" stroke-width="1"/>`;
  return `<svg width="70%" viewBox="0 0 ${TW} ${BH+16}" xmlns="http://www.w3.org/2000/svg" style="display:block;">${zeroline}${bars}</svg>`;
}

(()=>{
  const af=SCHOOL.news.slice().sort((a,b)=>b.d.localeCompare(a.d));

  SCHOOL.last=af[0]?.d||'—';
  SCHOOL.avgSc=af.length?Math.round(af.reduce((s,n)=>s+n.tot,0)/af.length):0;
  SCHOOL.mavg=af.length?(af.length/MONTHS).toFixed(1):'0.0';
})();

// Pre-compute
// 新聞數量＝校網以#學系名稱串接的校網新聞 ＋ 學系自行建置（不重複計算）
D.forEach(d=>{
  // 1. 學系網站自有新聞（CUT 後），逐篇評分並標記是否已出現於校網
  const deptAf=d.news.filter(n=>n.d>=CUT).sort((a,b)=>b.d.localeCompare(a.d));
  const deptTitles=new Set(deptAf.map(n=>n.t));
  deptAf.forEach(n=>{
    const s=autoSc(n.t,n.d);n.g=s.g;n.v=s.v;n.a=s.a;n.tot=s.g+s.v+s.a;
    n.fromSch=SCH_TITLES.has(n.t);
    if(n.fromSch){const sr=SCH_BY_TITLE.get(n.t);n.schUrl=sr?.url;}
  });

  // 2. 校網有標記此系（cats 含 d.name）但學系尚未轉貼的新聞（校網獨家）
  const schOnly=SCHOOL_RAW
    .filter(s=>jd(s.d)>=CUT&&(s.cats||[]).includes(d.name)&&!deptTitles.has(s.t))
    .map(s=>{
      const sd=jd(s.d);
      const sc=autoSc(s.t,sd);
      return{d:sd,t:s.t,url:s.url,fromSch:true,schUrl:s.url,
             g:sc.g,v:sc.v,a:sc.a,tot:sc.g+sc.v+sc.a};
    });

  // 3. 合併：學系自有 ＋ 校網獨家串接，按日期降序
  const af=[...deptAf,...schOnly].sort((a,b)=>b.d.localeCompare(a.d));

  d.af=af;
  d.cnt=af.length;
  d.last=af[0]?.d||'—';
  d.avgSc=af.length?Math.round(af.reduce((s,n)=>s+n.tot,0)/af.length):0;
  d.mavg=af.length?(af.length/MONTHS).toFixed(1):'0.0';
  d.fromSch=af.filter(n=>n.fromSch).length;  // 校網介接（含轉貼＋獨家）
  d.self=af.filter(n=>!n.fromSch).length;     // 學系純自建
});

    document.getElementById('mn').scrollTop=0;

  }

  const d=D.find(x=>x.id===id);
  const col=cols.find(c=>c.k===d.col);
  const pct=Math.min(100,Math.round((d.cnt/TGT)*100));
  const rem=Math.max(0,TGT-d.cnt);

  let h=legendHTML+`
  <div class="card" style="padding:.8rem 1.4rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <div>
        <div class="dn">${d.name}</div>

      </div>
      <a href="${d.url}" target="_blank" style="font-size:11px;padding:5px 12px;background:#f7f6f2;border:1px solid #d3d1c7;border-radius:6px;text-decoration:none;color:#5F5E5A;white-space:nowrap;flex-shrink:0;">

    <div class="sc"><div class="sv" style="color:#BA7517;">${d.mavg}</div><div class="sl"><i class="ti ti-calendar" style="font-size:13px;"></i><br>則/月（114學年）</div></div>

      <i class="ti ti-chart-bar" style="font-size:10px;color:#1D9E75;margin-right:3px;"></i>月發文趨勢（114學年度）
      <span style="float:right;font-size:9px;font-weight:400;color:#B4B2A9;">
        <span style="display:inline-block;width:6px;height:6px;background:#1D9E75;border-radius:2px;margin-right:2px;"></span>≥5則
        <span style="display:inline-block;width:6px;height:6px;background:#5DCAA5;border-radius:2px;margin:0 2px 0 6px;"></span>1–4則
        <span style="display:inline-block;width:6px;height:6px;background:#ebe9e0;border-radius:2px;margin:0 2px 0 6px;"></span>無
      </span>
    </div>
    ${buildMonthChart(d.af)}
  </div>
  <div class="card">
    <div class="pb-r">
      <span><i class="ti ti-flag" style="font-size:12px;"></i> 114學年度累計：${d.cnt}則（${MONTHS}個月 / 平均${d.mavg}則/月）</span>
      <span>目標 ${TGT} 則</span>
    </div>
    <div class="pb-bg"><div class="pb-f" style="width:${pct}%"></div></div>
    <div class="pb-n">${pct}%&nbsp;&nbsp;${rem>0?`✓ 再發布 <strong>${rem}</strong> 則即可達標`:'🎉 已達標！'}</div>
  </div>`;

  if(d.af.length){
    const schPct=d.cnt?Math.round(d.fromSch/d.cnt*100):0;
    const selfPct=100-schPct;
    h+=`<div class="tbl-wrap">
    <div class="tbl-hdr" style="flex-direction:column;align-items:flex-start;gap:6px;">
      <div style="display:flex;align-items:center;gap:6px;width:100%;">
        <i class="ti ti-sparkles"></i>
        <span>114學年度新聞（${CUT} 起，共 ${d.cnt} 則｜AI品質評分）</span>
        <span style="margin-left:auto;font-size:10px;color:#888780;">
          <span style="color:#185FA5;font-weight:600;">校網介接 ${d.fromSch} 則</span>
          ｜
          <span style="color:#3B6D11;font-weight:600;">學系自建 ${d.self} 則</span>
        </span>
      </div>
      <div style="width:100%;height:5px;background:#f0efe8;border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${schPct}%;background:#185FA5;border-radius:3px;float:left;"></div>
        <div style="height:100%;width:${selfPct}%;background:#3B6D11;border-radius:3px;float:left;"></div>
      </div>
    </div>
    <table><thead><tr>
      <th style="width:30px;text-align:center;">#</th>
      <th>標題</th>
      <th style="width:60px;text-align:center;">來源</th>
      <th style="width:90px;">發佈日期</th>
      <th style="width:68px;">等級</th>
      <th style="width:140px;text-align:right;cursor:help;" title="${RUBRIC_TIP}">AI評分 /100 ⓘ</th>
    </tr></thead><tbody>`;
    d.af.forEach((n,i)=>{
      const gr=grd(n.tot);
      const srcBdg=n.fromSch
        ?`<span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;background:#185FA5;color:#fff;font-weight:700;letter-spacing:.03em;" title="此則新聞來自逢甲大學校官網介接">校網</span>`
        :`<span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;background:#F0F9EC;color:#3B6D11;font-weight:600;border:1px solid #C8E4B8;">自建</span>`;

        ?`window.open('${n.schUrl}','_blank')`
        :`window.open('${d.url}','_blank')`;

        <td style="text-align:center;color:#B4B2A9;font-size:11px;">${i+1}</td>

// ── 新聞撰寫小幫手：產生提示詞 ──
function buildWriterPrompt(){
  const dept=document.getElementById('wDept').value;
  const title=document.getElementById('wTitle').value.trim();
  const content=document.getElementById('wContent').value.trim();

  if(content.length<10){
    alert('請填寫至少 10 字的活動描述');
    return;
  }

  const prompt=`你是逢甲大學秘書處公共事務組的新聞撰稿助手。請依照以下「校園新聞評分標準 v3.0」撰寫新聞稿，並自評分數。

【資訊結構與事件即時性 /40】
- 標題要包含具體日期感與GEO結構化實體（數字/縮寫/排名等），例如「OO系3位學生勇奪全國賽冠軍」
- 內文開頭即點出事件重點，避免冗長鋪陳

【視覺品質與版面 /30】
- 若描述中有提及活動現場、典禮、競賽、展覽等畫面感強的場景，內文要描述具體畫面細節（人物動作、現場氛圍）
- 若是純公告/研究成果類，則著重條理清晰的分段

【語氣與真誠度 /30】
- 避免「展現量能」「再創佳績」「大放異彩」等公關套話與AI機器感詞彙
- 採用真誠直白、有人味的敘事語氣（可用「分享」「體驗」「攜手」等動詞）
- 避免官僚語氣或上對下指導語氣

請輸出以下格式（純文字，不要用 markdown 符號）：

【建議標題】
（一句話標題，15-25字，含GEO結構化實體）

【新聞稿草稿】
（200-350字，符合上述三項標準）

【自評分數】
時效與GEO結構：X/40
視覺品質與版面：X/30
語氣與真誠度：X/30
總分：X/100

【評分理由】
（簡短說明三個維度的評分依據，50字以內）

──────────

學系/單位：${dept||'未指定'}
活動標題（草稿）：${title||'（未提供，請自行擬定）'}

活動描述內容：
${content}`;

  document.getElementById('wOutput').value=prompt;
  document.getElementById('wOutputCard').style.display='block';
  document.getElementById('wOutputCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function copyWriterPrompt(){
  const ta=document.getElementById('wOutput');
  ta.select();
  navigator.clipboard?.writeText(ta.value).then(()=>{
    const msg=document.getElementById('wCopyMsg');
    msg.style.display='block';
    setTimeout(()=>msg.style.display='none',2500);
  }).catch(()=>{
    document.execCommand('copy');
  });
}

buildSB();
sel('aero');
</script>
